<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a0a20"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg7)" rx="16"/>
  <rect x="1" y="1" width="798" height="398" fill="none" stroke="white" stroke-opacity="0.05" rx="16"/>
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="serif" font-size="22" fill="white" font-weight="bold">Lip Flip Aftercare Checklist</text>
  <!-- Three columns -->
  <!-- First 4 Hours -->
  <rect x="30" y="65" width="235" height="310" rx="12" fill="white" fill-opacity="0.03" stroke="#f97316" stroke-opacity="0.2"/>
  <rect x="30" y="65" width="235" height="45" rx="12" fill="#f97316" fill-opacity="0.1"/>
  <rect x="30" y="98" width="235" height="12" fill="url(#bg7)"/>
  <circle cx="62" cy="88" r="14" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-opacity="0.5"/>
  <text x="62" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fb923c" font-weight="bold">4h</text>
  <text x="85" y="93" font-family="sans-serif" font-size="14" fill="#fb923c" font-weight="bold">First 4 Hours</text>
  <g transform="translate(50, 130)" font-family="sans-serif" font-size="11" fill="#cbd5e1">
    <circle cx="0" cy="0" r="3" fill="#f97316" opacity="0.6"/>
    <text x="12" y="4">No touching or rubbing</text>
    <circle cx="0" cy="30" r="3" fill="#f97316" opacity="0.6"/>
    <text x="12" y="34">Stay upright</text>
    <circle cx="0" cy="60" r="3" fill="#f97316" opacity="0.6"/>
    <text x="12" y="64">No lip makeup</text>
    <circle cx="0" cy="90" r="3" fill="#f97316" opacity="0.6"/>
    <text x="12" y="94">Avoid face-down</text>
    <text x="12" y="108" font-size="10" fill="#94a3b8">positions</text>
    <circle cx="0" cy="130" r="3" fill="#f97316" opacity="0.6"/>
    <text x="12" y="134">No massaging the</text>
    <text x="12" y="148" font-size="10" fill="#94a3b8">treatment area</text>
  </g>
  <!-- First 24 Hours -->
  <rect x="283" y="65" width="235" height="310" rx="12" fill="white" fill-opacity="0.03" stroke="#ec4899" stroke-opacity="0.2"/>
  <rect x="283" y="65" width="235" height="45" rx="12" fill="#ec4899" fill-opacity="0.1"/>
  <rect x="283" y="98" width="235" height="12" fill="url(#bg7)"/>
  <circle cx="315" cy="88" r="14" fill="#ec4899" fill-opacity="0.2" stroke="#ec4899" stroke-opacity="0.5"/>
  <text x="315" y="92" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f472b6" font-weight="bold">24h</text>
  <text x="338" y="93" font-family="sans-serif" font-size="14" fill="#f472b6" font-weight="bold">First 24 Hours</text>
  <g transform="translate(303, 130)" font-family="sans-serif" font-size="11" fill="#cbd5e1">
    <circle cx="0" cy="0" r="3" fill="#ec4899" opacity="0.6"/>
    <text x="12" y="4">No intense exercise</text>
    <circle cx="0" cy="30" r="3" fill="#ec4899" opacity="0.6"/>
    <text x="12" y="34">No alcohol</text>
    <circle cx="0" cy="60" r="3" fill="#ec4899" opacity="0.6"/>
    <text x="12" y="64">Skip hot beverages</text>
    <circle cx="0" cy="90" r="3" fill="#ec4899" opacity="0.6"/>
    <text x="12" y="94">Avoid saunas &amp;</text>
    <text x="12" y="108" font-size="10" fill="#94a3b8">steam rooms</text>
    <circle cx="0" cy="130" r="3" fill="#ec4899" opacity="0.6"/>
    <text x="12" y="134">No kissing or firm</text>
    <text x="12" y="148" font-size="10" fill="#94a3b8">lip pressure</text>
  </g>
  <!-- First Week -->
  <rect x="536" y="65" width="235" height="310" rx="12" fill="white" fill-opacity="0.03" stroke="#7c3aed" stroke-opacity="0.2"/>
  <rect x="536" y="65" width="235" height="45" rx="12" fill="#7c3aed" fill-opacity="0.1"/>
  <rect x="536" y="98" width="235" height="12" fill="url(#bg7)"/>
  <circle cx="568" cy="88" r="14" fill="#7c3aed" fill-opacity="0.2" stroke="#7c3aed" stroke-opacity="0.5"/>
  <text x="568" y="92" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a78bfa" font-weight="bold">7d</text>
  <text x="591" y="93" font-family="sans-serif" font-size="14" fill="#a78bfa" font-weight="bold">First Week</text>
  <g transform="translate(556, 130)" font-family="sans-serif" font-size="11" fill="#cbd5e1">
    <circle cx="0" cy="0" r="3" fill="#7c3aed" opacity="0.6"/>
    <text x="12" y="4">No dental work</text>
    <circle cx="0" cy="30" r="3" fill="#7c3aed" opacity="0.6"/>
    <text x="12" y="34">No facial treatments</text>
    <circle cx="0" cy="60" r="3" fill="#7c3aed" opacity="0.6"/>
    <text x="12" y="64">Avoid blood thinners</text>
    <circle cx="0" cy="90" r="3" fill="#7c3aed" opacity="0.6"/>
    <text x="12" y="94">Sleep on your back</text>
    <text x="12" y="108" font-size="10" fill="#94a3b8">if possible</text>
    <circle cx="0" cy="130" r="3" fill="#7c3aed" opacity="0.6"/>
    <text x="12" y="134">Be patient — full</text>
    <text x="12" y="148" font-size="10" fill="#94a3b8">results take 10-14 days</text>
  </g>
</svg>

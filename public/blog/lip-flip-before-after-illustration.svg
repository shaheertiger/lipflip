<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a0a20"/>
    </linearGradient>
    <linearGradient id="lipBefore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a0b0"/>
      <stop offset="100%" stop-color="#b07888"/>
    </linearGradient>
    <linearGradient id="lipAfter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg3)" rx="16"/>
  <rect x="1" y="1" width="798" height="398" fill="none" stroke="white" stroke-opacity="0.05" rx="16"/>
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="serif" font-size="22" fill="white" font-weight="bold">Lip Flip Before and After: Visual Comparison</text>
  <!-- Divider line -->
  <line x1="400" y1="65" x2="400" y2="350" stroke="white" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="6,4"/>
  <!-- BEFORE side -->
  <text x="200" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8" font-weight="600" letter-spacing="2">BEFORE</text>
  <!-- Before face -->
  <g transform="translate(200, 200)">
    <ellipse cx="0" cy="0" rx="80" ry="100" stroke="#475569" stroke-width="1" fill="none" opacity="0.3"/>
    <!-- Eyes -->
    <ellipse cx="-28" cy="-30" rx="14" ry="6" stroke="#64748b" stroke-width="1.2" fill="none" opacity="0.5"/>
    <ellipse cx="28" cy="-30" rx="14" ry="6" stroke="#64748b" stroke-width="1.2" fill="none" opacity="0.5"/>
    <!-- Nose -->
    <path d="M-4 -5 Q0 10 4 -5" stroke="#64748b" stroke-width="1" fill="none" opacity="0.4"/>
    <!-- Upper lip - thin, tucked in -->
    <path d="M-40 20 Q-25 16 0 18 Q25 16 40 20" stroke="url(#lipBefore)" stroke-width="2" fill="#b07888" fill-opacity="0.15"/>
    <path d="M-10 18.5 Q-5 15 0 18 Q5 15 10 18.5" stroke="#d4a0b0" stroke-width="1.2" fill="none" opacity="0.6"/>
    <!-- Lower lip -->
    <path d="M-40 20 Q-20 38 0 40 Q20 38 40 20" stroke="#b07888" stroke-width="1.5" fill="#b07888" fill-opacity="0.08"/>
    <!-- Downward arrows showing tuck-in -->
    <path d="M-20 10 L-20 17" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
    <path d="M-22 15 L-20 18 L-18 15" stroke="#94a3b8" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M20 10 L20 17" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
    <path d="M18 15 L20 18 L22 15" stroke="#94a3b8" stroke-width="1" fill="none" opacity="0.5"/>
  </g>
  <!-- Before labels -->
  <g transform="translate(200, 330)">
    <text x="0" y="0" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Upper lip tucks inward</text>
    <text x="0" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Less vermilion visible</text>
    <text x="0" y="36" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">Thin lip appearance when smiling</text>
  </g>
  <!-- AFTER side -->
  <text x="600" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ec4899" font-weight="600" letter-spacing="2">AFTER</text>
  <!-- After face -->
  <g transform="translate(600, 200)">
    <ellipse cx="0" cy="0" rx="80" ry="100" stroke="#ec4899" stroke-width="1" fill="none" opacity="0.15"/>
    <!-- Eyes -->
    <ellipse cx="-28" cy="-30" rx="14" ry="6" stroke="#f9a8d4" stroke-width="1.2" fill="none" opacity="0.5"/>
    <ellipse cx="28" cy="-30" rx="14" ry="6" stroke="#f9a8d4" stroke-width="1.2" fill="none" opacity="0.5"/>
    <!-- Nose -->
    <path d="M-4 -5 Q0 10 4 -5" stroke="#f9a8d4" stroke-width="1" fill="none" opacity="0.4"/>
    <!-- Upper lip - fuller, rolled out -->
    <path d="M-40 20 Q-25 10 0 13 Q25 10 40 20" stroke="url(#lipAfter)" stroke-width="2.5" fill="#ec4899" fill-opacity="0.2" filter="url(#glow3)"/>
    <path d="M-12 15 Q-6 9 0 13 Q6 9 12 15" stroke="#f472b6" stroke-width="1.8" fill="none" filter="url(#glow3)"/>
    <!-- Lower lip -->
    <path d="M-40 20 Q-20 40 0 42 Q20 40 40 20" stroke="#f9a8d4" stroke-width="1.5" fill="#ec4899" fill-opacity="0.08"/>
    <!-- Upward arrows showing roll-out -->
    <path d="M-20 20 L-20 13" stroke="#ec4899" stroke-width="1" opacity="0.7"/>
    <path d="M-22 15 L-20 12 L-18 15" stroke="#ec4899" stroke-width="1" fill="none" opacity="0.7"/>
    <path d="M20 20 L20 13" stroke="#ec4899" stroke-width="1" opacity="0.7"/>
    <path d="M18 15 L20 12 L22 15" stroke="#ec4899" stroke-width="1" fill="none" opacity="0.7"/>
  </g>
  <!-- After labels -->
  <g transform="translate(600, 330)">
    <text x="0" y="0" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f9a8d4">Upper lip gently rolls outward</text>
    <text x="0" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f9a8d4">More vermilion border visible</text>
    <text x="0" y="36" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f9a8d4">Fuller, more defined appearance</text>
  </g>
  <!-- VS circle -->
  <circle cx="400" cy="200" r="20" fill="#1a0a20" stroke="#ec4899" stroke-width="1" opacity="0.8"/>
  <text x="400" y="205" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ec4899" font-weight="bold">VS</text>
</svg>

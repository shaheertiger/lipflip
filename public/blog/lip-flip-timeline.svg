<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a0a20"/>
    </linearGradient>
    <linearGradient id="progressBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="30%" stop-color="#ec4899"/>
      <stop offset="70%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg4)" rx="16"/>
  <rect x="1" y="1" width="798" height="498" fill="none" stroke="white" stroke-opacity="0.05" rx="16"/>
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="serif" font-size="22" fill="white" font-weight="bold">How Long Does a Lip Flip Last? Complete Timeline</text>
  <text x="400" y="62" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">Day-by-day results and duration breakdown</text>
  <!-- Main timeline bar -->
  <rect x="80" y="120" width="640" height="6" rx="3" fill="#1e293b"/>
  <rect x="80" y="120" width="640" height="6" rx="3" fill="url(#progressBar)" opacity="0.6"/>
  <!-- Timeline nodes -->
  <!-- Day 1 -->
  <circle cx="80" cy="123" r="10" fill="#7c3aed" filter="url(#nodeGlow)"/>
  <circle cx="80" cy="123" r="4" fill="white"/>
  <text x="80" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a78bfa" font-weight="bold">Day 1</text>
  <rect x="30" y="150" width="100" height="70" rx="8" fill="white" fill-opacity="0.03" stroke="#7c3aed" stroke-opacity="0.2"/>
  <text x="80" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cbd5e1">Small injection</text>
  <text x="80" y="185" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cbd5e1">marks. No visible</text>
  <text x="80" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cbd5e1">results yet.</text>
  <!-- Days 3-5 -->
  <circle cx="240" cy="123" r="10" fill="#c026d3" filter="url(#nodeGlow)"/>
  <circle cx="240" cy="123" r="4" fill="white"/>
  <text x="240" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e879f9" font-weight="bold">Days 3-5</text>
  <rect x="185" y="150" width="110" height="70" rx="8" fill="white" fill-opacity="0.03" stroke="#c026d3" stroke-opacity="0.2"/>
  <text x="240" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cbd5e1">First changes</text>
  <text x="240" y="185" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cbd5e1">appear. Lip starts</text>
  <text x="240" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cbd5e1">to relax outward.</text>
  <!-- Days 10-14 (Peak) -->
  <circle cx="420" cy="123" r="14" fill="#ec4899" filter="url(#nodeGlow)"/>
  <circle cx="420" cy="123" r="6" fill="white"/>
  <text x="420" y="103" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f472b6" font-weight="bold">Days 10-14</text>
  <rect x="358" y="150" width="124" height="80" rx="8" fill="#ec4899" fill-opacity="0.08" stroke="#ec4899" stroke-opacity="0.3"/>
  <text x="420" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="600">PEAK RESULTS</text>
  <text x="420" y="188" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f9a8d4">Full effect visible.</text>
  <text x="420" y="203" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f9a8d4">Best time to assess</text>
  <text x="420" y="218" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f9a8d4">your results.</text>
  <!-- Weeks 6-8 -->
  <circle cx="570" cy="123" r="10" fill="#f97316" filter="url(#nodeGlow)"/>
  <circle cx="570" cy="123" r="4" fill="white"/>
  <text x="570" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fb923c" font-weight="bold">Weeks 6-8</text>
  <rect x="515" y="150" width="110" height="70" rx="8" fill="white" fill-opacity="0.03" stroke="#f97316" stroke-opacity="0.2"/>
  <text x="570" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cbd5e1">Effects begin</text>
  <text x="570" y="185" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cbd5e1">to gradually</text>
  <text x="570" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cbd5e1">fade.</text>
  <!-- Weeks 10-12 -->
  <circle cx="720" cy="123" r="10" fill="#64748b" filter="url(#nodeGlow)"/>
  <circle cx="720" cy="123" r="4" fill="white"/>
  <text x="720" y="108" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8" font-weight="bold">Weeks 10-12</text>
  <rect x="660" y="150" width="120" height="70" rx="8" fill="white" fill-opacity="0.03" stroke="#64748b" stroke-opacity="0.2"/>
  <text x="720" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cbd5e1">Effect mostly</text>
  <text x="720" y="185" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cbd5e1">worn off. Time</text>
  <text x="720" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cbd5e1">for touch-up.</text>
  <!-- Result intensity bar chart -->
  <text x="400" y="290" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="600">Result Intensity Over Time</text>
  <!-- Bar chart -->
  <g transform="translate(100, 310)">
    <!-- Y axis -->
    <line x1="0" y1="0" x2="0" y2="140" stroke="#334155" stroke-width="1"/>
    <text x="-10" y="10" text-anchor="end" font-family="sans-serif" font-size="9" fill="#64748b">100%</text>
    <text x="-10" y="50" text-anchor="end" font-family="sans-serif" font-size="9" fill="#64748b">70%</text>
    <text x="-10" y="80" text-anchor="end" font-family="sans-serif" font-size="9" fill="#64748b">50%</text>
    <text x="-10" y="140" text-anchor="end" font-family="sans-serif" font-size="9" fill="#64748b">0%</text>
    <!-- X axis -->
    <line x1="0" y1="140" x2="600" y2="140" stroke="#334155" stroke-width="1"/>
    <!-- Bars -->
    <rect x="20" y="105" width="60" height="35" rx="4" fill="#7c3aed" opacity="0.7"/>
    <text x="50" y="160" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">Week 1</text>
    <rect x="100" y="5" width="60" height="135" rx="4" fill="#c026d3" opacity="0.7"/>
    <text x="130" y="160" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">Week 2</text>
    <rect x="180" y="5" width="60" height="135" rx="4" fill="#ec4899" opacity="0.8"/>
    <text x="210" y="160" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">Week 3-4</text>
    <rect x="260" y="5" width="60" height="135" rx="4" fill="#ec4899" opacity="0.7"/>
    <text x="290" y="160" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">Week 5-6</text>
    <rect x="340" y="30" width="60" height="110" rx="4" fill="#f97316" opacity="0.6"/>
    <text x="370" y="160" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">Week 7-8</text>
    <rect x="420" y="70" width="60" height="70" rx="4" fill="#f97316" opacity="0.4"/>
    <text x="450" y="160" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">Week 9-10</text>
    <rect x="500" y="110" width="60" height="30" rx="4" fill="#64748b" opacity="0.4"/>
    <text x="530" y="160" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">Week 11-12</text>
  </g>
</svg>

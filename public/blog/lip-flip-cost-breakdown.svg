<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a0a20"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="barGrad3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="barGrad4" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg5)" rx="16"/>
  <rect x="1" y="1" width="798" height="448" fill="none" stroke="white" stroke-opacity="0.05" rx="16"/>
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="serif" font-size="22" fill="white" font-weight="bold">How Much Does a Lip Flip Cost?</text>
  <text x="400" y="62" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">Average cost comparison by provider type</text>
  <!-- Price range highlight -->
  <rect x="250" y="80" width="300" height="36" rx="18" fill="#ec4899" fill-opacity="0.1" stroke="#ec4899" stroke-opacity="0.2"/>
  <text x="400" y="103" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#f472b6" font-weight="bold">Most patients pay $100 - $300</text>
  <!-- Bar chart -->
  <g transform="translate(100, 150)">
    <!-- Grid lines -->
    <line x1="180" y1="0" x2="180" y2="210" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="330" y1="0" x2="330" y2="210" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="480" y1="0" x2="480" y2="210" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="600" y1="0" x2="600" y2="210" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
    <!-- Grid labels -->
    <text x="180" y="230" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">$100</text>
    <text x="330" y="230" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">$200</text>
    <text x="480" y="230" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">$400</text>
    <text x="600" y="230" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748b">$500</text>
    <!-- Medical Spa bar -->
    <text x="0" y="22" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="500">Medical Spa</text>
    <rect x="30" y="30" width="240" height="28" rx="6" fill="url(#barGrad1)" opacity="0.8"/>
    <text x="40" y="49" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">$80 - $200</text>
    <!-- Nurse/PA bar -->
    <text x="0" y="82" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="500">Nurse / PA</text>
    <rect x="30" y="90" width="330" height="28" rx="6" fill="url(#barGrad2)" opacity="0.8"/>
    <text x="40" y="109" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">$150 - $300</text>
    <!-- Dermatologist bar -->
    <text x="0" y="142" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="500">Dermatologist</text>
    <rect x="30" y="150" width="440" height="28" rx="6" fill="url(#barGrad3)" opacity="0.8"/>
    <text x="40" y="169" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">$250 - $400</text>
    <!-- Plastic Surgeon bar -->
    <text x="0" y="202" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="500">Plastic Surgeon</text>
    <rect x="30" y="210" width="570" height="28" rx="6" fill="url(#barGrad4)" opacity="0.8"/>
    <text x="40" y="229" font-family="sans-serif" font-size="11" fill="white" font-weight="bold">$300 - $500</text>
  </g>
  <!-- Bottom comparison -->
  <g transform="translate(100, 410)">
    <rect x="0" y="0" width="250" height="30" rx="6" fill="white" fill-opacity="0.03" stroke="#ec4899" stroke-opacity="0.2"/>
    <text x="125" y="20" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f9a8d4">Lip Flip: $80 - $500 / session</text>
    <rect x="280" y="0" width="320" height="30" rx="6" fill="white" fill-opacity="0.03" stroke="#64748b" stroke-opacity="0.2"/>
    <text x="440" y="20" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#94a3b8">vs. Lip Filler: $500 - $2,000+ / session</text>
  </g>
</svg>

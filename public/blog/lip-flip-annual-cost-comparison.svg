<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bgAnn" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a0a20"/>
    </linearGradient>
    <linearGradient id="flipGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="fillerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="comboGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bgAnn)" rx="16"/>
  <rect x="1" y="1" width="798" height="448" fill="none" stroke="white" stroke-opacity="0.05" rx="16"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="serif" font-size="22" fill="white" font-weight="bold">Annual Cost Comparison: Lip Enhancement Options</text>
  <text x="400" y="58" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">Estimated yearly cost to maintain continuous results</text>

  <!-- Chart -->
  <g transform="translate(100, 90)">
    <!-- Y axis -->
    <line x1="80" y1="0" x2="80" y2="260" stroke="#334155" stroke-width="1"/>
    <text x="70" y="8" text-anchor="end" font-family="sans-serif" font-size="10" fill="#64748b">$3,000</text>
    <line x1="75" y1="0" x2="80" y2="0" stroke="#334155" stroke-width="1"/>
    <text x="70" y="52" text-anchor="end" font-family="sans-serif" font-size="10" fill="#64748b">$2,500</text>
    <text x="70" y="95" text-anchor="end" font-family="sans-serif" font-size="10" fill="#64748b">$2,000</text>
    <line x1="75" y1="87" x2="600" y2="87" stroke="#334155" stroke-width="0.5" stroke-dasharray="4"/>
    <text x="70" y="138" text-anchor="end" font-family="sans-serif" font-size="10" fill="#64748b">$1,500</text>
    <text x="70" y="182" text-anchor="end" font-family="sans-serif" font-size="10" fill="#64748b">$1,000</text>
    <line x1="75" y1="174" x2="600" y2="174" stroke="#334155" stroke-width="0.5" stroke-dasharray="4"/>
    <text x="70" y="225" text-anchor="end" font-family="sans-serif" font-size="10" fill="#64748b">$500</text>
    <text x="70" y="268" text-anchor="end" font-family="sans-serif" font-size="10" fill="#64748b">$0</text>
    <!-- X axis -->
    <line x1="80" y1="260" x2="600" y2="260" stroke="#334155" stroke-width="1"/>

    <!-- Bar 1: Lip Flip Only -->
    <!-- Low range: $320 → height = (320/3000)*260 = 27.7 -->
    <!-- High range: $1000 → height = (1000/3000)*260 = 86.7 -->
    <rect x="120" y="173" width="70" height="87" rx="6" fill="url(#flipGrad)" opacity="0.85"/>
    <rect x="120" y="228" width="70" height="32" rx="0" fill="url(#flipGrad)" opacity="0.4"/>
    <text x="155" y="163" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f9a8d4" font-weight="700">$320–$1K</text>
    <text x="155" y="285" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e2e8f0" font-weight="500">Lip Flip</text>
    <text x="155" y="300" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">4–5 sessions</text>

    <!-- Bar 2: Lip Filler Only -->
    <!-- Low range: $500 → height = (500/3000)*260 = 43.3 -->
    <!-- High range: $3000 → height = (3000/3000)*260 = 260 -->
    <rect x="260" y="0" width="70" height="260" rx="6" fill="url(#fillerGrad)" opacity="0.85"/>
    <rect x="260" y="217" width="70" height="43" rx="0" fill="url(#fillerGrad)" opacity="0.4"/>
    <text x="295" y="-10" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#67e8f9" font-weight="700">$500–$3K</text>
    <text x="295" y="285" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e2e8f0" font-weight="500">Lip Filler</text>
    <text x="295" y="300" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">1–2 sessions</text>

    <!-- Bar 3: Flip + Filler Combo -->
    <!-- Low range: $800 → height = (800/3000)*260 = 69.3 -->
    <!-- High range: $2500 → height = (2500/3000)*260 = 216.7 -->
    <rect x="400" y="43" width="70" height="217" rx="6" fill="url(#comboGrad)" opacity="0.85"/>
    <rect x="400" y="191" width="70" height="69" rx="0" fill="url(#comboGrad)" opacity="0.4"/>
    <text x="435" y="33" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#c4b5fd" font-weight="700">$800–$2.5K</text>
    <text x="435" y="285" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e2e8f0" font-weight="500">Flip + Filler</text>
    <text x="435" y="300" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">5–7 sessions</text>
  </g>

  <!-- Bottom note -->
  <rect x="120" y="405" width="560" height="30" rx="10" fill="white" fill-opacity="0.03" stroke="#ec4899" stroke-opacity="0.15"/>
  <text x="400" y="425" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f9a8d4">Lip flip is the most affordable option — starting at just $6/week for fuller-looking lips</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <defs>
    <linearGradient id="bgComp" x1="0" y1="0" x2="800" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a0a20"/>
    </linearGradient>
    <linearGradient id="flipBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="fillerBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bgComp)" rx="16"/>
  <rect x="1" y="1" width="798" height="418" fill="none" stroke="white" stroke-opacity="0.05" rx="16"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="serif" font-size="22" fill="white" font-weight="bold">Lip Flip vs. Lip Filler: Duration Comparison</text>
  <text x="400" y="58" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">How long each treatment lasts and what to expect</text>

  <!-- Legend -->
  <rect x="260" y="75" width="14" height="14" rx="3" fill="url(#flipBar)"/>
  <text x="280" y="87" font-family="sans-serif" font-size="12" fill="#f9a8d4">Lip Flip (Botox)</text>
  <rect x="420" y="75" width="14" height="14" rx="3" fill="url(#fillerBar)"/>
  <text x="440" y="87" font-family="sans-serif" font-size="12" fill="#67e8f9">Lip Filler (HA)</text>

  <!-- Comparison rows -->
  <!-- Row 1: Duration -->
  <text x="60" y="130" font-family="sans-serif" font-size="12" fill="#94a3b8" font-weight="600">Duration</text>
  <rect x="180" y="115" width="180" height="24" rx="6" fill="url(#flipBar)" opacity="0.7"/>
  <text x="270" y="132" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="600">8–12 weeks</text>
  <rect x="180" y="145" width="480" height="24" rx="6" fill="url(#fillerBar)" opacity="0.7"/>
  <text x="420" y="162" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="600">6–18 months</text>

  <!-- Row 2: Onset Time -->
  <text x="60" y="205" font-family="sans-serif" font-size="12" fill="#94a3b8" font-weight="600">Onset Time</text>
  <rect x="180" y="190" width="160" height="24" rx="6" fill="url(#flipBar)" opacity="0.7"/>
  <text x="260" y="207" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="600">3–5 days</text>
  <rect x="180" y="220" width="60" height="24" rx="6" fill="url(#fillerBar)" opacity="0.7"/>
  <text x="210" y="237" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="600">Instant</text>

  <!-- Row 3: Cost per session -->
  <text x="60" y="280" font-family="sans-serif" font-size="12" fill="#94a3b8" font-weight="600">Cost / Session</text>
  <rect x="180" y="265" width="130" height="24" rx="6" fill="url(#flipBar)" opacity="0.7"/>
  <text x="245" y="282" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="600">$80–$200</text>
  <rect x="180" y="295" width="340" height="24" rx="6" fill="url(#fillerBar)" opacity="0.7"/>
  <text x="350" y="312" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="600">$500–$1,500</text>

  <!-- Row 4: Annual Cost -->
  <text x="60" y="355" font-family="sans-serif" font-size="12" fill="#94a3b8" font-weight="600">Annual Cost</text>
  <rect x="180" y="340" width="260" height="24" rx="6" fill="url(#flipBar)" opacity="0.7"/>
  <text x="310" y="357" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="600">$400–$1,000 (4-5 sessions)</text>
  <rect x="180" y="370" width="340" height="24" rx="6" fill="url(#fillerBar)" opacity="0.7"/>
  <text x="350" y="387" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="600">$500–$1,500 (1-2 sessions)</text>
</svg>
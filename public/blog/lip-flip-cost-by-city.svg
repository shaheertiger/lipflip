<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <defs>
    <linearGradient id="bgCity" x1="0" y1="0" x2="800" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a0a20"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#bgCity)" rx="16"/>
  <rect x="1" y="1" width="798" height="518" fill="none" stroke="white" stroke-opacity="0.05" rx="16"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="serif" font-size="22" fill="white" font-weight="bold">Lip Flip Cost by Major U.S. City (2026)</text>
  <text x="400" y="58" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#94a3b8">Average price range per session based on provider surveys</text>

  <!-- Legend -->
  <rect x="290" y="75" width="14" height="14" rx="3" fill="url(#barGrad)" opacity="0.6"/>
  <text x="310" y="87" font-family="sans-serif" font-size="12" fill="#cbd5e1">Low end</text>
  <rect x="390" y="75" width="14" height="14" rx="3" fill="url(#barGrad)"/>
  <text x="410" y="87" font-family="sans-serif" font-size="12" fill="#cbd5e1">High end</text>

  <!-- Chart area -->
  <g transform="translate(160, 110)">
    <!-- Y axis labels (cities) -->
    <!-- Row 1: New York City -->
    <text x="-10" y="18" text-anchor="end" font-family="sans-serif" font-size="12" fill="#e2e8f0" font-weight="500">New York City</text>
    <rect x="0" y="5" width="420" height="22" rx="4" fill="url(#barGrad)" opacity="0.3"/>
    <rect x="0" y="5" width="420" height="22" rx="4" fill="url(#barGrad)" opacity="0.85"/>
    <text x="430" y="21" font-family="sans-serif" font-size="11" fill="#f9a8d4" font-weight="600">$150–$300</text>

    <!-- Row 2: Los Angeles -->
    <text x="-10" y="58" text-anchor="end" font-family="sans-serif" font-size="12" fill="#e2e8f0" font-weight="500">Los Angeles</text>
    <rect x="0" y="45" width="390" height="22" rx="4" fill="url(#barGrad)" opacity="0.8"/>
    <text x="400" y="61" font-family="sans-serif" font-size="11" fill="#f9a8d4" font-weight="600">$130–$275</text>

    <!-- Row 3: Miami -->
    <text x="-10" y="98" text-anchor="end" font-family="sans-serif" font-size="12" fill="#e2e8f0" font-weight="500">Miami</text>
    <rect x="0" y="85" width="370" height="22" rx="4" fill="url(#barGrad)" opacity="0.75"/>
    <text x="380" y="101" font-family="sans-serif" font-size="11" fill="#f9a8d4" font-weight="600">$120–$250</text>

    <!-- Row 4: San Francisco -->
    <text x="-10" y="138" text-anchor="end" font-family="sans-serif" font-size="12" fill="#e2e8f0" font-weight="500">San Francisco</text>
    <rect x="0" y="125" width="380" height="22" rx="4" fill="url(#barGrad)" opacity="0.75"/>
    <text x="390" y="141" font-family="sans-serif" font-size="11" fill="#f9a8d4" font-weight="600">$130–$260</text>

    <!-- Row 5: Chicago -->
    <text x="-10" y="178" text-anchor="end" font-family="sans-serif" font-size="12" fill="#e2e8f0" font-weight="500">Chicago</text>
    <rect x="0" y="165" width="320" height="22" rx="4" fill="url(#barGrad)" opacity="0.7"/>
    <text x="330" y="181" font-family="sans-serif" font-size="11" fill="#f9a8d4" font-weight="600">$100–$225</text>

    <!-- Row 6: Dallas -->
    <text x="-10" y="218" text-anchor="end" font-family="sans-serif" font-size="12" fill="#e2e8f0" font-weight="500">Dallas</text>
    <rect x="0" y="205" width="290" height="22" rx="4" fill="url(#barGrad)" opacity="0.65"/>
    <text x="300" y="221" font-family="sans-serif" font-size="11" fill="#f9a8d4" font-weight="600">$90–$200</text>

    <!-- Row 7: Atlanta -->
    <text x="-10" y="258" text-anchor="end" font-family="sans-serif" font-size="12" fill="#e2e8f0" font-weight="500">Atlanta</text>
    <rect x="0" y="245" width="280" height="22" rx="4" fill="url(#barGrad)" opacity="0.6"/>
    <text x="290" y="261" font-family="sans-serif" font-size="11" fill="#f9a8d4" font-weight="600">$85–$190</text>

    <!-- Row 8: Denver -->
    <text x="-10" y="298" text-anchor="end" font-family="sans-serif" font-size="12" fill="#e2e8f0" font-weight="500">Denver</text>
    <rect x="0" y="285" width="270" height="22" rx="4" fill="url(#barGrad)" opacity="0.55"/>
    <text x="280" y="301" font-family="sans-serif" font-size="11" fill="#f9a8d4" font-weight="600">$80–$180</text>

    <!-- Row 9: Phoenix -->
    <text x="-10" y="338" text-anchor="end" font-family="sans-serif" font-size="12" fill="#e2e8f0" font-weight="500">Phoenix</text>
    <rect x="0" y="325" width="260" height="22" rx="4" fill="url(#barGrad)" opacity="0.5"/>
    <text x="270" y="341" font-family="sans-serif" font-size="11" fill="#f9a8d4" font-weight="600">$75–$175</text>
  </g>

  <!-- Footer note -->
  <text x="400" y="495" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">Prices vary by provider experience, brand used, and number of units. National average: $80–$200.</text>
</svg>
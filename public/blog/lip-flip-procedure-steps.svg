<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" fill="none">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="800" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a0a20"/>
    </linearGradient>
    <filter id="stepGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="350" fill="url(#bg8)" rx="16"/>
  <rect x="1" y="1" width="798" height="348" fill="none" stroke="white" stroke-opacity="0.05" rx="16"/>
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="serif" font-size="22" fill="white" font-weight="bold">The Lip Flip Procedure: Step by Step</text>
  <!-- Connecting line -->
  <line x1="130" y1="105" x2="670" y2="105" stroke="#ec4899" stroke-width="1" opacity="0.2" stroke-dasharray="6,4"/>
  <!-- Step 1 -->
  <g transform="translate(130, 80)">
    <circle cx="0" cy="25" r="25" fill="#7c3aed" fill-opacity="0.15" stroke="#7c3aed" stroke-opacity="0.4" filter="url(#stepGlow)"/>
    <text x="0" y="31" text-anchor="middle" font-family="serif" font-size="18" fill="#a78bfa" font-weight="bold">1</text>
    <text x="0" y="75" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="600">Consultation</text>
    <text x="0" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">Discuss goals &amp;</text>
    <text x="0" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">assess candidacy</text>
    <text x="0" y="135" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">5-10 min</text>
    <!-- Icon: clipboard -->
    <g transform="translate(-8, -5)" opacity="0.5">
      <rect x="2" y="16" width="12" height="15" rx="1.5" stroke="#a78bfa" stroke-width="1" fill="none"/>
      <rect x="4" y="13" width="8" height="4" rx="1" stroke="#a78bfa" stroke-width="1" fill="none"/>
      <line x1="5" y1="22" x2="11" y2="22" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="5" y1="25" x2="11" y2="25" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="5" y1="28" x2="9" y2="28" stroke="#a78bfa" stroke-width="0.8"/>
    </g>
  </g>
  <!-- Step 2 -->
  <g transform="translate(310, 80)">
    <circle cx="0" cy="25" r="25" fill="#c026d3" fill-opacity="0.15" stroke="#c026d3" stroke-opacity="0.4" filter="url(#stepGlow)"/>
    <text x="0" y="31" text-anchor="middle" font-family="serif" font-size="18" fill="#e879f9" font-weight="bold">2</text>
    <text x="0" y="75" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="600">Preparation</text>
    <text x="0" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">Clean area &amp; apply</text>
    <text x="0" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">topical numbing</text>
    <text x="0" y="135" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">5 min (optional)</text>
  </g>
  <!-- Step 3 -->
  <g transform="translate(490, 80)">
    <circle cx="0" cy="25" r="28" fill="#ec4899" fill-opacity="0.15" stroke="#ec4899" stroke-opacity="0.5" filter="url(#stepGlow)"/>
    <text x="0" y="31" text-anchor="middle" font-family="serif" font-size="18" fill="#f472b6" font-weight="bold">3</text>
    <text x="0" y="75" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="600">Injection</text>
    <text x="0" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f9a8d4">2-4 precise injections</text>
    <text x="0" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f9a8d4">along upper lip border</text>
    <text x="0" y="135" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ec4899" font-weight="600">Under 60 seconds</text>
  </g>
  <!-- Step 4 -->
  <g transform="translate(670, 80)">
    <circle cx="0" cy="25" r="25" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.4" filter="url(#stepGlow)"/>
    <text x="0" y="31" text-anchor="middle" font-family="serif" font-size="18" fill="#4ade80" font-weight="bold">4</text>
    <text x="0" y="75" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="600">Done!</text>
    <text x="0" y="100" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">Resume normal</text>
    <text x="0" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">activities immediately</text>
    <text x="0" y="135" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">Zero downtime</text>
  </g>
  <!-- Bottom stats bar -->
  <rect x="80" y="260" width="640" height="65" rx="12" fill="white" fill-opacity="0.02" stroke="white" stroke-opacity="0.05"/>
  <g transform="translate(80, 260)">
    <g transform="translate(40, 0)">
      <text x="60" y="28" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ec4899" font-weight="bold">10-15</text>
      <text x="60" y="48" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">Minutes Total</text>
    </g>
    <line x1="160" y1="15" x2="160" y2="50" stroke="white" stroke-opacity="0.05"/>
    <g transform="translate(200, 0)">
      <text x="60" y="28" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ec4899" font-weight="bold">4-10</text>
      <text x="60" y="48" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">Units of Botox</text>
    </g>
    <line x1="360" y1="15" x2="360" y2="50" stroke="white" stroke-opacity="0.05"/>
    <g transform="translate(400, 0)">
      <text x="60" y="28" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#ec4899" font-weight="bold">1-2/10</text>
      <text x="60" y="48" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">Pain Level</text>
    </g>
    <line x1="560" y1="15" x2="560" y2="50" stroke="white" stroke-opacity="0.05"/>
    <g transform="translate(565, 0)">
      <text x="37" y="28" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#22c55e" font-weight="bold">0</text>
      <text x="37" y="48" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">Days Downtime</text>
    </g>
  </g>
</svg>

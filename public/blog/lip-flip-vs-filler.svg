<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" fill="none">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="800" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a0a20"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg6)" rx="16"/>
  <rect x="1" y="1" width="798" height="478" fill="none" stroke="white" stroke-opacity="0.05" rx="16"/>
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="serif" font-size="22" fill="white" font-weight="bold">Lip Flip vs. Lip Filler at a Glance</text>
  <!-- Lip Flip Card -->
  <rect x="40" y="70" width="345" height="380" rx="12" fill="white" fill-opacity="0.03" stroke="#ec4899" stroke-opacity="0.2"/>
  <rect x="40" y="70" width="345" height="50" rx="12" fill="#ec4899" fill-opacity="0.1"/>
  <rect x="40" y="108" width="345" height="12" fill="url(#bg6)"/>
  <text x="212" y="102" text-anchor="middle" font-family="serif" font-size="18" fill="#f472b6" font-weight="bold">LIP FLIP</text>
  <!-- Lip Flip details -->
  <g transform="translate(60, 145)" font-family="sans-serif" font-size="12">
    <text x="0" y="0" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">MECHANISM</text>
    <text x="0" y="18" fill="#e2e8f0">Relaxes muscle with neurotoxin</text>
    <line x1="0" y1="30" x2="305" y2="30" stroke="white" stroke-opacity="0.05"/>
    <text x="0" y="50" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">RESULT</text>
    <text x="0" y="68" fill="#e2e8f0">Subtle — lip rolls outward</text>
    <line x1="0" y1="80" x2="305" y2="80" stroke="white" stroke-opacity="0.05"/>
    <text x="0" y="100" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">DURATION</text>
    <text x="0" y="118" fill="#f472b6" font-weight="bold" font-size="16">6 - 12 weeks</text>
    <line x1="0" y1="132" x2="305" y2="132" stroke="white" stroke-opacity="0.05"/>
    <text x="0" y="152" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">COST PER SESSION</text>
    <text x="0" y="170" fill="#f472b6" font-weight="bold" font-size="16">$80 - $500</text>
    <line x1="0" y1="184" x2="305" y2="184" stroke="white" stroke-opacity="0.05"/>
    <text x="0" y="204" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">DOWNTIME</text>
    <text x="0" y="222" fill="#e2e8f0">None</text>
    <line x1="0" y1="234" x2="305" y2="234" stroke="white" stroke-opacity="0.05"/>
    <text x="0" y="254" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">BEST FOR</text>
    <text x="0" y="272" fill="#e2e8f0">First-timers, subtle enhancement</text>
  </g>
  <!-- Lip Filler Card -->
  <rect x="415" y="70" width="345" height="380" rx="12" fill="white" fill-opacity="0.03" stroke="#64748b" stroke-opacity="0.2"/>
  <rect x="415" y="70" width="345" height="50" rx="12" fill="white" fill-opacity="0.03"/>
  <rect x="415" y="108" width="345" height="12" fill="url(#bg6)"/>
  <text x="587" y="102" text-anchor="middle" font-family="serif" font-size="18" fill="#94a3b8" font-weight="bold">LIP FILLER</text>
  <!-- Lip Filler details -->
  <g transform="translate(435, 145)" font-family="sans-serif" font-size="12">
    <text x="0" y="0" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">MECHANISM</text>
    <text x="0" y="18" fill="#e2e8f0">Adds volume with hyaluronic acid</text>
    <line x1="0" y1="30" x2="305" y2="30" stroke="white" stroke-opacity="0.05"/>
    <text x="0" y="50" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">RESULT</text>
    <text x="0" y="68" fill="#e2e8f0">Noticeable — fuller, plumper lips</text>
    <line x1="0" y1="80" x2="305" y2="80" stroke="white" stroke-opacity="0.05"/>
    <text x="0" y="100" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">DURATION</text>
    <text x="0" y="118" fill="#94a3b8" font-weight="bold" font-size="16">6 - 12 months</text>
    <line x1="0" y1="132" x2="305" y2="132" stroke="white" stroke-opacity="0.05"/>
    <text x="0" y="152" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">COST PER SESSION</text>
    <text x="0" y="170" fill="#94a3b8" font-weight="bold" font-size="16">$500 - $2,000+</text>
    <line x1="0" y1="184" x2="305" y2="184" stroke="white" stroke-opacity="0.05"/>
    <text x="0" y="204" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">DOWNTIME</text>
    <text x="0" y="222" fill="#e2e8f0">1 - 3 days swelling</text>
    <line x1="0" y1="234" x2="305" y2="234" stroke="white" stroke-opacity="0.05"/>
    <text x="0" y="254" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">BEST FOR</text>
    <text x="0" y="272" fill="#e2e8f0">Significant volume, defined shape</text>
  </g>
  <!-- VS divider -->
  <circle cx="400" cy="260" r="22" fill="#1a0a20" stroke="#ec4899" stroke-width="1.5"/>
  <text x="400" y="265" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ec4899" font-weight="bold">VS</text>
</svg>
